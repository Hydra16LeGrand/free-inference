# LiteLLM Proxy Configuration v1.83.7-stable
# Role: Gateway between clients (Open WebUI) and the vLLM inference engine.
# Database: PostgreSQL 16 (auto-migrated via Prisma on first boot).

model_list:
  # --- Chat / Completion Models ---
  - model_name: base-mind
    litellm_params:
      model: openai/base-mind
      api_base: http://multimodal-api:8000/v1
      api_key: os.environ/VLLM_API_KEY
      temperature: 0.2
      max_tokens: 256
      rpm_limit: 60
      tpm_limit: 100000

  # --- Embedding Models ---
  - model_name: bge-m3
    litellm_params:
      model: openai/bge-m3
      api_base: http://multimodal-api:8000/v1
      api_key: os.environ/VLLM_API_KEY
      rpm_limit: 120

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  proxy_batch_write_at: 100
  store_model_in_db: true
  allow_user_auth: false
  # Self-serve for internal users (admin creates account, user manages keys)
  max_internal_user_budget: 10
  internal_user_budget_duration: "1mo"
  default_internal_user_params:
    user_role: "internal_user"
    models: ["base-mind", "bge-m3"]
  key_generation_settings:
    personal_key_generation:
      allowed_user_roles: ["internal_user", "proxy_admin"]

litellm_settings:
  request_timeout: 120
  num_retries: 3
  set_verbose: false
  log_level: INFO
  success_callback: ["prometheus"]
  failure_callback: ["prometheus"]
