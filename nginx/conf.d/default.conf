# ============================================================
# Nginx Reverse Proxy — Free Inference
# Variables: ${DOMAIN} is substituted at container startup via envsubst
# Sous-domaines : ${DOMAIN} (landing), chat.${DOMAIN}, api.${DOMAIN}, dash.${DOMAIN}
# ============================================================

# --- 1. Landing Page (${DOMAIN} / www.${DOMAIN}) ---
server {
    listen 80;
    server_name ${DOMAIN} www.${DOMAIN};

    root /usr/share/nginx/html/landing;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# --- 2. Open WebUI (chat.${DOMAIN}) ---
server {
    listen 80;
    server_name chat.${DOMAIN};

    # General rate limiting
    limit_req zone=general burst=20 nodelay;

    location / {
        proxy_pass http://open-webui:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (needed for streaming)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# --- 3. LiteLLM API (api.${DOMAIN}) ---
server {
    listen 80;
    server_name api.${DOMAIN};

    # Stricter rate limiting for API
    limit_req zone=api burst=50 nodelay;

    location / {
        proxy_pass http://litellm:4000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for LLM inference (can be slow)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # WebSocket/SSE streaming support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
    }
}

# --- 4. Grafana Dashboard (dash.${DOMAIN}) ---
server {
    listen 80;
    server_name dash.${DOMAIN};

    # Basic auth layer (Grafana also has its own auth)
    # Uncomment if you want nginx-level protection too:
    # auth_basic "Admin Area";
    # auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass http://grafana:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- 5. Prometheus (restricted — localhost only) ---
# Prometheus should NOT be exposed publicly. Access via SSH tunnel or VPN.
# If you absolutely need it, add auth_basic and limit to specific IPs.
