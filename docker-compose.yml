services:
  # --- 1. Base de Données PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: inference-postgres
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-litellm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - inference-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-litellm} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- 2. vLLM (Inference Engine) ---
  vllm:
    build:
      context: ./vllm
      dockerfile: Dockerfile
    container_name: inference-vllm
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./vllm/configs:/configs
      - ./vllm_chat_template.jinja:/configs/chat_template.jinja:ro
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - inference-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      VLLM_API_KEY: ${VLLM_API_KEY}
      HF_HUB_ENABLE_XET: "False"
      VLLM_MODEL: ${VLLM_MODEL:-solidrust/Mistral-7B-Instruct-v0.3-AWQ}
      VLLM_QUANTIZATION: ${VLLM_QUANTIZATION:-awq}
      VLLM_MAX_MODEL_LEN: ${VLLM_MAX_MODEL_LEN:-6144}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

  # --- 3. Multimodal API (LangGraph Orchestrator) ---
  multimodal-api:
    build:
      context: ./multimodal-api
      dockerfile: Dockerfile
    container_name: inference-multimodal-api
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      VLLM_URL: http://vllm:8000/v1/chat/completions
      VLLM_HEALTH_URL: http://vllm:8000/health
      VLLM_API_KEY: ${VLLM_API_KEY}
      TARGET_MODEL: ${VLLM_MODEL:-solidrust/Mistral-7B-Instruct-v0.3-AWQ}
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE:-small}
      EMBED_MODEL: ${EMBED_MODEL:-BAAI/bge-m3}
      MAX_BODY_SIZE_MB: "10"
      HF_HUB_ENABLE_XET: "False"
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./multimodal-api/main.py:/app/main.py:ro
    ports:
      - "127.0.0.1:8001:8000"
    networks:
      - inference-net
    depends_on:
      vllm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  # --- 4. LiteLLM Proxy ---
  litellm:
    image: ghcr.io/berriai/litellm:v1.83.7-stable
    container_name: inference-litellm
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER:-litellm}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      VLLM_API_KEY: ${VLLM_API_KEY}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    ports:
      - "127.0.0.1:4000:4000"
    networks:
      - inference-net
    depends_on:
      postgres:
        condition: service_healthy
      vllm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    command: ["--config", "/app/config.yaml", "--port", "4000"]

  # --- 4. Open WebUI (Simplified Interface) ---
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.12
    container_name: inference-webui
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      OPENAI_API_BASE_URL: http://litellm:4000
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY}
      AIOHTTP_CLIENT_TIMEOUT: 360
      HF_TOKEN: ${HF_TOKEN:-}
      RAG_EMBEDDING_ENGINE: ""
      RAG_EMBEDDING_MODEL: ""
      # --- Simplified UI ---
      ENABLE_PERSISTENT_CONFIG: "False"
      ENABLE_WEB_SEARCH: "False"
      ENABLE_IMAGE_GENERATION: "False"
      ENABLE_CODE_EXECUTION: "False"
      ENABLE_CODE_INTERPRETER: "False"
      ENABLE_AUTOMATIONS: "False"
      ENABLE_CALENDAR: "False"
      ENABLE_NOTES: "False"
      ENABLE_MEMORIES: "False"
      ENABLE_CHANNELS: "False"
      ENABLE_API_KEYS: "False"
      ENABLE_COMMUNITY_SHARING: "False"
      ENABLE_EASTER_EGGS: "False"
      ENABLE_TITLE_GENERATION: "False"
      ENABLE_TAGS_GENERATION: "False"
      ENABLE_FOLLOW_UP_GENERATION: "False"
      ENABLE_AUTOCOMPLETE_GENERATION: "False"
      USER_PERMISSIONS_CHAT_CONTROLS: "False"
      USER_PERMISSIONS_CHAT_TEMPORARY: "False"
      USER_PERMISSIONS_SETTINGS_INTERFACE: "False"
      USER_PERMISSIONS_FEATURES_FOLDERS: "False"
      WEBUI_NAME: "Base Mind"
      ENABLE_SIGNUP: "True"
    volumes:
      - open_webui_data:/app/backend/data
    ports:
      - "127.0.0.1:3000:8080"
    networks:
      - inference-net
    depends_on:
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  # --- 5. Ngrok (Tunnel Sécurisé) ---
  # Service optionnel : démarre uniquement avec --profile tunnel
  # docker compose --profile tunnel up -d ngrok
  ngrok:
    image: ngrok/ngrok:3.37.3-alpine
    container_name: inference-ngrok
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - tunnel
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
      NGROK_WEB_ADDR: 0.0.0.0:4040
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        EXTRA=""
        [ -n "$${NGROK_DOMAIN}" ] && EXTRA="$${EXTRA} --domain=$${NGROK_DOMAIN}"
        [ -n "$${NGROK_BASIC_AUTH}" ] && EXTRA="$${EXTRA} --basic-auth=$${NGROK_BASIC_AUTH}"
        exec ngrok http litellm:4000 $${EXTRA}
    ports:
      - "127.0.0.1:4040:4040"
    networks:
      - inference-net
    depends_on:
      litellm:
        condition: service_healthy

  # --- 6. Prometheus ---
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: inference-prometheus
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - inference-net
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'

  # --- 7. Grafana ---
  grafana:
    image: grafana/grafana:11.6.0
    container_name: inference-grafana
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3100:3000"
    networks:
      - inference-net
    depends_on:
      prometheus:
        condition: service_started

volumes:
  postgres_data:
  open_webui_data:
  hf_cache:
  grafana_data:

networks:
  inference-net:
    driver: bridge
